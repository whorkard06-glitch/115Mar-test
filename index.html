<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y2K AI 驅動教學工作坊 - 報名表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --y2k-pink: #ff00e6;
            --y2k-cyan: #00f3ff;
            --y2k-yellow: #f0ff00;
            --y2k-dark: #1a1a2e;
        }

        body {
            background-color: var(--y2k-dark);
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 0, 230, 0.2) 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, rgba(0, 243, 255, 0.2) 0%, transparent 50%);
            font-family: 'Noto Sans TC', sans-serif;
            color: white;
            padding: 20px;
        }

        .chrome-text {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(180deg, #fff 0%, #aaa 45%, #444 50%, #888 55%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 0px var(--y2k-pink));
        }

        .y2k-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 3px solid var(--y2k-cyan);
            border-radius: 40px;
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            position: relative;
        }

        .pill-button {
            background: linear-gradient(to bottom, var(--y2k-pink), #b000a0);
            border: 2px solid #fff;
            border-radius: 50px;
            padding: 12px 30px;
            color: white;
            font-weight: bold;
            transition: all 0.2s;
            cursor: pointer;
            box-shadow: 0 0 15px var(--y2k-pink);
        }

        .pill-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--y2k-pink);
        }

        .pill-button:disabled {
            background: #444;
            cursor: not-allowed;
            opacity: 0.5;
            box-shadow: none;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: bold;
            color: var(--y2k-cyan);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input, select, textarea {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--y2k-cyan);
            border-radius: 12px;
            padding: 12px 15px;
            color: #fff;
            width: 100%;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--y2k-pink);
            box-shadow: 0 0 10px rgba(255, 0, 230, 0.3);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: var(--y2k-yellow);
            color: black;
            font-weight: 900;
            border-radius: 5px;
            transform: rotate(-2deg);
            box-shadow: 4px 4px 0 var(--y2k-pink);
            font-family: 'Orbitron', sans-serif;
        }

        .section-title {
            color: var(--y2k-pink);
            border-left: 4px solid var(--y2k-pink);
            padding-left: 10px;
            margin: 30px 0 20px 0;
            font-weight: 900;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="y2k-container">
        <div class="flex flex-col md:flex-row justify-between items-start mb-10 gap-4">
            <header>
                <h1 class="chrome-text text-4xl font-black">GEN-AI WORKSHOP</h1>
                <p class="text-cyan-400 font-bold italic">行政效率翻倍工作坊 - 報名系統</p>
            </header>
            <div id="quotaInfo" class="status-badge text-sm">
                QUOTA: LOADING...
            </div>
        </div>

        <form id="registrationForm">
            <!-- 第一部分：基本資訊 -->
            <h2 class="section-title">// 基本資訊 BASIC INFO</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-group">
                    <label>姓名 NAME *</label>
                    <input type="text" name="name" placeholder="請輸入完整姓名" required>
                </div>
                <div class="form-group">
                    <label>電子郵件 EMAIL *</label>
                    <input type="email" name="email" placeholder="example@mail.com" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-group">
                    <label>服務單位 UNIT *</label>
                    <input type="text" name="unit" placeholder="例如：教學部、護理部" required>
                </div>
                <div class="form-group">
                    <label>職稱 TITLE *</label>
                    <select name="title" required>
                        <option value="" disabled selected>請選擇職稱</option>
                        <option value="醫師">醫師</option>
                        <option value="護理師">護理師</option>
                        <option value="醫事人員">醫事人員</option>
                        <option value="行政人員">行政人員</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>活動當天是否需要提供茶水點心？</label>
                <select name="snack" required>
                    <option value="是">是 (Yes)</option>
                    <option value="否">否 (No)</option>
                </select>
            </div>

            <!-- 第二部分：AI 經驗調查 -->
            <h2 class="section-title">// AI 經驗調查 EXPERIENCE SURVEY</h2>

            <div class="form-group">
                <label>您目前使用生成式 AI (如 ChatGPT) 的頻率？</label>
                <select name="frequency" required>
                    <option value="從未使用過">從未使用過</option>
                    <option value="偶爾使用 (每月幾次)">偶爾使用 (每月幾次)</option>
                    <option value="經常使用 (每週幾次)">經常使用 (每週幾次)</option>
                    <option value="每天使用">每天使用</option>
                </select>
            </div>

            <div class="form-group">
                <label>您目前已經在使用哪些 AI 工具？ (可多填)</label>
                <input type="text" name="tools" placeholder="例如：ChatGPT, Gemini, Claude, Midjourney...">
            </div>

            <div class="form-group">
                <label>您對目前「與 AI 協作處理行政庶務」的信心指數？ (1-10分)</label>
                <input type="range" name="confidence" min="1" max="10" value="5" class="accent-cyan-400" oninput="this.nextElementSibling.value = this.value">
                <output class="block text-center text-yellow-400 font-bold mt-2">5</output>
            </div>

            <div class="form-group">
                <label>在日常行政工作中，最讓您感到耗時的「痛點」是什麼？</label>
                <textarea name="painPoints" rows="3" placeholder="例如：整理會議紀錄、撰寫活動企劃、分析問卷數據..."></textarea>
            </div>

            <div class="form-group">
                <label>對本工作坊的期待或會前補充事項</label>
                <textarea name="message" rows="2" placeholder="有任何想學習的特定功能或問題嗎？"></textarea>
            </div>

            <div class="text-center mt-12 mb-6">
                <button type="submit" id="submitBtn" class="pill-button text-lg w-full md:w-auto px-12">
                    SEND TO FUTURE ⚡ 送出報名
                </button>
                <p class="text-xs text-gray-400 mt-4 italic">* 報名成功後將寄發系統確認信至您的電子郵件</p>
            </div>
        </form>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz71D5n5covm_0xaVl_FIq4tczK0a9eVipjJOnmLnYKfkhF-jRxjVs8E1MypJv4wPc1/exec';
        const form = document.getElementById('registrationForm');
        const btn = document.getElementById('submitBtn');
        const quotaInfo = document.getElementById('quotaInfo');

        // 1. 初始化檢查名額
        async function checkQuota() {
            try {
                const response = await fetch(`${scriptURL}?action=status`);
                const data = await response.json();
                const remaining = data.limit - data.count;
                
                quotaInfo.innerText = `QUOTA: ${remaining} LEFT`;
                
                if (remaining <= 0) {
                    btn.disabled = true;
                    btn.innerText = 'SOLD OUT / 名額已滿';
                    quotaInfo.style.background = '#ff0000';
                    quotaInfo.style.color = 'white';
                    quotaInfo.innerText = `QUOTA: FULL (30/30)`;
                }
            } catch (e) {
                console.error('Quota check failed', e);
                quotaInfo.innerText = 'QUOTA: OFFLINE';
            }
        }

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            if (!confirm('確認送出報名資料？')) return;

            btn.disabled = true;
            btn.innerText = 'PROCESSING... ⚡';

            const formData = new URLSearchParams(new FormData(form)).toString();

            // 使用 POST 發送
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            })
            .then(() => {
                alert('報名成功！一封通知信已寄到您的電子郵件。請記得檢查垃圾信箱。');
                form.reset();
                window.location.reload(); 
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('系統忙碌中或網路錯誤，請稍後再試。');
                btn.disabled = false;
                btn.innerText = 'SEND TO FUTURE ⚡ 送出報名';
            });
        });

        // 進入網頁即檢查名額
        checkQuota();
    </script>
</body>
</html>
